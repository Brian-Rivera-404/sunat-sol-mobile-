    <style>
      .phone-frame-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100vw;
        height: 100vh;
        background: #1a1a2e;
      }
      .phone-frame {
        width: 390px;
        height: 844px;
        background: #fff;
        border-radius: 44px;
        overflow: hidden;
        box-shadow:
          0 0 0 2px #333,
          0 0 0 4px #555,
          0 0 60px rgba(0,0,0,0.5);
        position: relative;
        display: flex;
        flex-direction: column;
      }
      .phone-notch {
        position: absolute;
        top: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 160px;
        height: 30px;
        background: #1a1a2e;
        border-radius: 0 0 16px 16px;
        z-index: 10;
      }
      @media (max-width: 480px) {
        .phone-frame {
          width: 100vw;
          height: 100vh;
          border-radius: 0;
          box-shadow: none;
          display: block;
        }
        .phone-notch {
          display: none;
        }
      }
    </style>
